# ==============================================================
# vault-infrastructure.yml
#
# Complete Vault setup for Docker Desktop Kubernetes.
# Includes everything needed in a single file:
#
#   1. Namespace
#   2. PersistentVolumes
#   3. PersistentVolumeClaims
#   4. ConfigMap  (vault.hcl)
#   5. Service    (ClusterIP — Kong is the only ingress point)
#   6. Deployment (with init container for hostPath permissions)
#   7. Ingress    (vault.local → kong-proxy → vault service)
#
# Pre-requisites (one-time, already done):
#   - Nginx Ingress Controller installed
#   - Kong running and accessible at kong-admin.local
#   - hosts file contains: 127.0.0.1 vault.local
#
# Apply with:
#   kubectl apply -f vault-infrastructure.yml
#
# After applying, register Vault in Kong (one-time, see bottom
# of this file for the PowerShell commands).
# ==============================================================


# --------------------------------------------------------------
# 1. Namespace
# --------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: vault


---
# --------------------------------------------------------------
# 2a. PersistentVolume — vault data (raft storage)
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-data-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/vault-data


---
# --------------------------------------------------------------
# 2b. PersistentVolume — vault logs
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-logs-pv
spec:
  capacity:
    storage: 500Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/vault-logs


---
# --------------------------------------------------------------
# 3a. PersistentVolumeClaim — vault data
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi


---
# --------------------------------------------------------------
# 3b. PersistentVolumeClaim — vault logs
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-logs-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 500Mi


---
# --------------------------------------------------------------
# 4. ConfigMap — vault.hcl
#
# Key decisions:
#   - Raft integrated storage (no Consul needed)
#   - HTTP only (dev — no TLS complexity)
#   - ui = true so Vault UI is served on port 8200
#   - api_addr uses the Service DNS name so Vault Agent
#     in other namespaces can reach Vault via:
#     http://vault.vault.svc.cluster.local:8200
# --------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui            = true
    disable_mlock = true

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }

    storage "raft" {
      path    = "/vault/data"
      node_id = "vault-node-1"
    }

    api_addr     = "http://vault.vault.svc.cluster.local:8200"
    cluster_addr = "http://vault.vault.svc.cluster.local:8201"


---
# --------------------------------------------------------------
# 5. Service
#
# ClusterIP only — Kong is the sole ingress point.
# Port 8201 is for Raft cluster communication (internal only).
# NodePort removed — vault.local via Kong is the access method.
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  type: ClusterIP
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201


---
# --------------------------------------------------------------
# 6. Deployment
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: default

      # ----------------------------------------------------
      # Init container — runs as root to fix hostPath
      # directory ownership before Vault starts.
      # Docker Desktop creates /mnt/vault-* as root:root,
      # but Vault runs as uid:100 / gid:1000.
      # ----------------------------------------------------
      initContainers:
        - name: vault-chown
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 100:1000 /vault/data /vault/logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-logs
              mountPath: /vault/logs

      containers:
        - name: vault
          image: hashicorp/vault:1.19.0
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster

          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /vault/config-temp/vault.hcl /vault/config/vault.hcl
              chmod 644 /vault/config/vault.hcl
              exec vault server -config=/vault/config/vault.hcl

          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_LOG_LEVEL
              value: "info"

          securityContext:
            capabilities:
              add:
                - IPC_LOCK
            runAsUser:  100
            runAsGroup: 1000

          volumeMounts:
            - name: vault-config-temp
              mountPath: /vault/config-temp
              readOnly: true
            - name: vault-config
              mountPath: /vault/config
            - name: vault-data
              mountPath: /vault/data
            - name: vault-logs
              mountPath: /vault/logs

          # health endpoint query params:
          #   uninitcode=204  → 204 (not failure) when uninitialized
          #   sealedcode=204  → 204 (not failure) when sealed
          # This prevents K8s from restart-looping the pod while
          # you perform the one-time init + unseal.
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=204&sealedcode=204
              port: 8200
            initialDelaySeconds: 60
            periodSeconds:       15
            failureThreshold:    5

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=204&sealedcode=204
              port: 8200
            initialDelaySeconds: 10
            periodSeconds:       5

      volumes:
        - name: vault-config-temp
          configMap:
            name: vault-config
        - name: vault-config
          emptyDir: {}
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-data-pvc
        - name: vault-logs
          persistentVolumeClaim:
            claimName: vault-logs-pvc


---
# --------------------------------------------------------------
# 7. Ingress — vault.local
#
# Routes vault.local → kong-proxy → Kong vault-service →
# vault.vault.svc.cluster.local:8200
#
# Why its own hostname (not a path prefix like /vault)?
#   Vault UI makes internal requests to /ui/, /v1/, /sys/ etc.
#   A path prefix would break all those internal redirects.
#   A dedicated hostname (same pattern as kong-ui.local) is
#   the only clean solution.
#
# Pre-requisite: add to C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1 vault.local
#
# Note: lives in the kong namespace — consistent with all other
# Ingress rules in your setup (kong-proxy-ingress, etc.)
# --------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: kong
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: vault.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kong-proxy
            port:
              number: 80


# ==============================================================
# POST-APPLY: Register Vault in Kong (run once in PowerShell)
#
# Kong services and routes are registered via the Admin API,
# not Kubernetes manifests — this is consistent with how your
# existing integratedapi-service and routes are configured.
#
# 1. Create Kong Service:
#
# Invoke-RestMethod -Uri "http://kong-admin.local/services" `
#     -Method POST `
#     -ContentType 'application/json' `
#     -Body (@{
#         name     = "vault-service"
#         protocol = "http"
#         host     = "vault.vault.svc.cluster.local"
#         port     = 8200
#     } | ConvertTo-Json)
#
# 2. Create Kong Route:
#
# Invoke-RestMethod -Uri "http://kong-admin.local/services/vault-service/routes" `
#     -Method POST `
#     -ContentType 'application/json' `
#     -Body (@{
#         name       = "vault-route"
#         hosts      = @("vault.local")
#         paths      = @("/")
#         strip_path = $false
#     } | ConvertTo-Json)
#
# 3. Verify:
#
# Invoke-RestMethod -Uri "http://kong-admin.local/services/vault-service" |
#     ConvertTo-Json
# ==============================================================