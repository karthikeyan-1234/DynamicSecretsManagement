# ==============================================================
# vault-infrastructure.yml
#
# Complete Vault infrastructure for Docker Desktop Kubernetes.
# Safe to commit to source control — no secret values.
#
# Apply order:
#   1. kubectl apply -f vault-infrastructure.yml   ← this file
#   2. vault operator init   (manual — one-time)
#   3. vault operator unseal (manual — one-time, and after restarts)
#   4. kubectl apply -f vault-rbac.yml
#   5. kubectl create secret generic vault-root-token ...  (manual)
#   6. kubectl apply -f vault-init-job.yml
#   7. vault kv put secret/stripe-config ...  (manual — secret values)
#   8. kubectl apply -f deployment-vault-agent.yml
#
# Contents:
#   1. Namespace
#   2. PersistentVolumes (hostPath — Docker Desktop compatible)
#   3. PersistentVolumeClaims
#   4. ConfigMap  (vault.hcl — Vault server config)
#   5. Service    (ClusterIP — Kong is the ingress point)
#   6. Deployment (with busybox init container for permissions)
#   7. Ingress    (vault.local → kong-proxy → Vault)
# ==============================================================


# --------------------------------------------------------------
# 1. Namespace
# --------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: vault


---
# --------------------------------------------------------------
# 2a. PersistentVolume — vault data (raft storage)
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-data-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/vault-data


---
# --------------------------------------------------------------
# 2b. PersistentVolume — vault logs
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-logs-pv
spec:
  capacity:
    storage: 500Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/vault-logs


---
# --------------------------------------------------------------
# 3a. PersistentVolumeClaim — vault data
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi


---
# --------------------------------------------------------------
# 3b. PersistentVolumeClaim — vault logs
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-logs-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 500Mi


---
# --------------------------------------------------------------
# 4. ConfigMap — vault.hcl
#
# Key decisions:
#   - Raft integrated storage (no Consul needed)
#   - HTTP only (dev — no TLS complexity)
#   - ui = true (Vault UI served on port 8200)
#   - api_addr uses K8s Service DNS so Vault Agent in other
#     namespaces can reach Vault via cross-namespace DNS
# --------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui            = true
    disable_mlock = true

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }

    storage "raft" {
      path    = "/vault/data"
      node_id = "vault-node-1"
    }

    api_addr     = "http://vault.vault.svc.cluster.local:8200"
    cluster_addr = "http://vault.vault.svc.cluster.local:8201"


---
# --------------------------------------------------------------
# 5. Service — ClusterIP
#
# Kong is the sole external ingress point.
# Port 8201 is Raft cluster communication (internal only).
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  type: ClusterIP
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201


---
# --------------------------------------------------------------
# 6. Deployment
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: default

      initContainers:
        # Docker Desktop creates hostPath dirs as root:root.
        # Vault runs as uid:100 / gid:1000 — fix ownership first.
        - name: vault-chown
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 100:1000 /vault/data /vault/logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-logs
              mountPath: /vault/logs

      containers:
        - name: vault
          image: hashicorp/vault:1.19.0   # pinned — never use :latest
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster

          # ConfigMap is read-only so we copy vault.hcl to a
          # writable emptyDir before starting the Vault process.
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /vault/config-temp/vault.hcl /vault/config/vault.hcl
              chmod 644 /vault/config/vault.hcl
              exec vault server -config=/vault/config/vault.hcl

          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_LOG_LEVEL
              value: "info"

          securityContext:
            capabilities:
              add:
                - IPC_LOCK
            runAsUser:  100
            runAsGroup: 1000

          volumeMounts:
            - name: vault-config-temp
              mountPath: /vault/config-temp
              readOnly: true
            - name: vault-config
              mountPath: /vault/config
            - name: vault-data
              mountPath: /vault/data
            - name: vault-logs
              mountPath: /vault/logs

          # uninitcode=204 + sealedcode=204 tell Vault to return
          # HTTP 204 (not failure) when uninitialized or sealed.
          # This prevents K8s restart-looping the pod during the
          # one-time init + unseal window.
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=204&sealedcode=204
              port: 8200
            initialDelaySeconds: 60
            periodSeconds:       15
            failureThreshold:    5

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=204&sealedcode=204
              port: 8200
            initialDelaySeconds: 10
            periodSeconds:       5

      volumes:
        - name: vault-config-temp
          configMap:
            name: vault-config
        - name: vault-config
          emptyDir: {}
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-data-pvc
        - name: vault-logs
          persistentVolumeClaim:
            claimName: vault-logs-pvc


---
# --------------------------------------------------------------
# 7. Ingress — vault.local → kong-proxy → Vault
#
# Lives in the kong namespace — consistent with all other
# Ingress rules (kong-proxy-ingress, kong-ui-ingress etc.)
#
# vault.local gets its own hostname (not a /vault path prefix)
# because the Vault UI makes internal requests to /ui/, /v1/,
# /sys/ etc. A path prefix would break all those redirects.
#
# Pre-requisite: add to C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1 vault.local
# --------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: kong
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: vault.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kong-proxy
            port:
              number: 80
