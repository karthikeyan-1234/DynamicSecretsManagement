# ------------------------------------------------------------
# Secret containing StripeOptions configuration as a JSON file
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: stripe-config
type: Opaque
stringData:
  # This will be mounted as a file named "appsettings.json"
  appsettings.json: |
    {
      "StripeOptions": {
        "SecretKey": "sk_test_initial_1234567890",
        "PublishableKey": "pk_test_initial_1234567890",
        "MaxRetries": 30
      }
    }
---
# ------------------------------------------------------------
# Deployment for the DynamicSecretsManagement app
# ------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-secrets-app
  labels:
    app: dynamic-secrets-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamic-secrets-app
  template:
    metadata:
      labels:
        app: dynamic-secrets-app
    spec:
      containers:
        - name: app
          image: dynamic-secrets-app:v5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:80"
          # Mount the secret as a volume
          volumeMounts:
            - name: stripe-secret-volume
              mountPath: /app/secrets
              readOnly: true
      volumes:
        - name: stripe-secret-volume
          secret:
            secretName: stripe-config
---
# ------------------------------------------------------------
# Service to expose the app internally
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dynamic-secrets-app-service
spec:
  type: ClusterIP
  selector:
    app: dynamic-secrets-app
  ports:
    - port: 80
      targetPort: 80
      name: http