# ==============================================================
# deployment-vault-agent.yml
#
# App deployment with Vault Agent sidecar for real-time secret
# rotation. Safe to commit — contains no secret values.
#
# Changes from previous version:
#   1. agent-config.hcl — added template_config block with
#      static_secret_render_interval = "5s" to force frequent
#      re-checks of KV v2 secrets regardless of lease state.
#      Also tightened wait.max from 10s to 5s and added vault
#      retry block.
#
#   2. Deployment env — added DOTNET_FILE_POLLING_INTERVAL_MILLISECONDS
#      to reduce .NET filesystem polling from 4s to 2s.
#
# Expected propagation time after these changes:
#   Vault Agent re-check : ~5s  (was 2-5 min, lease-driven)
#   Template render wait : ~2-5s (was up to 10s)
#   Filesystem polling   : ~2s  (was 4s)
#   Total worst case     : ~12s (was 2-5 min)
#
# Apply with:
#   kubectl apply -f deployment-vault-agent.yml
#
# Pre-requisites:
#   - vault-infrastructure.yml applied and Vault unsealed
#   - vault-rbac.yml applied
#   - vault-init-job.yml completed successfully
#   - vault kv put secret/stripe-config ... run manually
# ==============================================================


# --------------------------------------------------------------
# ConfigMap — Vault Agent config + appsettings.json template
#
# Two keys:
#   agent-config.hcl  — Agent authentication, vault address,
#                        template_config (polling interval),
#                        and template render settings
#   appsettings.tmpl  — Go template that renders appsettings.json
#                        from Vault KV v2 secret values
# --------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: default
data:

  agent-config.hcl: |
    # ----------------------------------------------------------
    # Authentication — Kubernetes auth method
    # The Agent uses the pod's ServiceAccount token to prove
    # identity to Vault. No hardcoded credentials anywhere.
    # ----------------------------------------------------------
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "dynamic-secrets-role"
        }
      }

      # Cached Vault token written here after successful auth
      sink "file" {
        config = {
          path = "/app/secrets/.vault-token"
        }
      }
    }

    # ----------------------------------------------------------
    # Vault address
    # Cross-namespace DNS: Vault is in the 'vault' namespace,
    # this pod runs in 'default'.
    # ----------------------------------------------------------
    vault {
      address = "http://vault.vault.svc.cluster.local:8200"
      retry {
        num_retries = 5
      }
    }

    # ----------------------------------------------------------
    # template_config — controls how often the Agent re-checks
    # static secrets (KV v2 is a static secret in Vault's model)
    #
    # WHY this is needed:
    #   Without this, Vault Agent re-checks KV v2 secrets based
    #   on lease renewal timing, which can be several minutes.
    #   static_secret_render_interval forces a re-check on a
    #   fixed timer regardless of lease state — this is the
    #   primary fix for slow secret propagation.
    # ----------------------------------------------------------
    template_config {
      static_secret_render_interval = "5s"
    }

    # ----------------------------------------------------------
    # Template — renders /app/secrets/appsettings.json from
    # Vault KV values whenever a new secret version is detected.
    #
    # wait block: small jitter window between re-check and render
    # to avoid hammering Vault on multiple rapid updates.
    # ----------------------------------------------------------
    template {
      source      = "/vault/templates/appsettings.tmpl"
      destination = "/app/secrets/appsettings.json"
      wait {
        min = "2s"
        max = "5s"
      }
    }

  # ------------------------------------------------------------
  # appsettings.tmpl — Go template rendered by Vault Agent.
  # Output is a valid JSON appsettings.json file.
  # .Data.data is the KV v2 path to the actual secret values.
  # ------------------------------------------------------------
  appsettings.tmpl: |
    {{- with secret "secret/data/stripe-config" -}}
    {
      "StripeOptions": {
        "SecretKey":      "{{ .Data.data.SecretKey }}",
        "PublishableKey": "{{ .Data.data.PublishableKey }}",
        "MaxRetries":     {{ .Data.data.MaxRetries }}
      }
    }
    {{- end }}


---
# --------------------------------------------------------------
# Deployment — app + Vault Agent init container + sidecar
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-secrets-app
  labels:
    app: dynamic-secrets-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamic-secrets-app
  template:
    metadata:
      labels:
        app: dynamic-secrets-app
    spec:
      # Must match bound_service_account_names in the Vault role
      # and the ServiceAccount created in vault-rbac.yml
      serviceAccountName: dynamic-secrets-sa

      # --------------------------------------------------------
      # Init container — Vault Agent runs once before the app
      # starts, fetches secrets from Vault, renders
      # appsettings.json into /app/secrets, then exits.
      #
      # This ensures the file exists when the app container
      # starts so StripeOptions.ValidateOnStart() passes.
      # --------------------------------------------------------
      initContainers:
        - name: vault-agent-init
          image: hashicorp/vault:1.19.0
          args:
            - agent
            - -config=/vault/config/agent-config.hcl
            - -exit-after-auth=true   # render once then exit
          env:
            - name: VAULT_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: vault-agent-config
              mountPath: /vault/config
            - name: vault-templates
              mountPath: /vault/templates
            - name: shared-secrets
              mountPath: /app/secrets

      containers:
        # ------------------------------------------------------
        # Main app container
        # ------------------------------------------------------
        - name: app
          image: dynamic-secrets-app:v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            # --------------------------------------------------
            # Reduces .NET PhysicalFileProvider polling interval
            # from the default 4s to 2s so IConfiguration picks
            # up the rewritten appsettings.json faster after
            # Vault Agent renders a new version.
            # --------------------------------------------------
            - name: DOTNET_FILE_POLLING_INTERVAL_MILLISECONDS
              value: "2000"
          volumeMounts:
            - name: shared-secrets
              mountPath: /app/secrets
              readOnly: true

        # ------------------------------------------------------
        # Vault Agent sidecar — daemon that runs alongside app.
        # Polls Vault every 5s (static_secret_render_interval),
        # re-renders appsettings.json when KV version changes.
        # Polling provider in Program.cs detects the new file
        # within ~2s and triggers IConfiguration reload.
        # ------------------------------------------------------
        - name: vault-agent
          image: hashicorp/vault:1.19.0
          args:
            - agent
            - -config=/vault/config/agent-config.hcl
          env:
            - name: VAULT_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: vault-agent-config
              mountPath: /vault/config
            - name: vault-templates
              mountPath: /vault/templates
            - name: shared-secrets
              mountPath: /app/secrets

      volumes:
        # Agent HCL configuration
        - name: vault-agent-config
          configMap:
            name: vault-agent-config
            items:
              - key: agent-config.hcl
                path: agent-config.hcl

        # Go template for rendering appsettings.json
        - name: vault-templates
          configMap:
            name: vault-agent-config
            items:
              - key: appsettings.tmpl
                path: appsettings.tmpl

        # Shared emptyDir — written by Vault Agent, read by app
        - name: shared-secrets
          emptyDir: {}


---
# --------------------------------------------------------------
# Service — unchanged
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dynamic-secrets-app-service
spec:
  type: ClusterIP
  selector:
    app: dynamic-secrets-app
  ports:
    - port: 80
      targetPort: 80
      name: http